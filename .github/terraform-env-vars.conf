# Terraform env vars: one per line. Single source of truth — add new vars here; no workflow edits.
# Repo-specific — each repository keeps its own config.
# - VAR_NAME                    → value from environment (e.g. workflow env/secrets).
# - VAR_NAME=literal            → written as-is into .env
# - VAR_NAME=op://vault/item/field → value from 1Password (requires op CLI + OP_SERVICE_ACCOUNT_TOKEN).
#
# S3 backend: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY must be supplied by CI secrets (see terraform.yaml).
GITHUB_PAT=op://surefireops/github_actions_secrets_terraform/github_classic_token
AWS_ACCESS_KEY_ID
AWS_SECRET_ACCESS_KEY
AWS_DEFAULT_REGION=us-east-1
